<!DOCTYPE html>
<html>
  <head>
    <title>ESP WEB SERVER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
  </head>
  <body>
    <div class="topnav">
      <h1>ESP WEB SERVER</h1>
    </div>
	<div>
		<h2>Use the clock buttons to set times for bugle calls<h2>
		<h2>Use the boxes next to the clocks to disable calls<h2>
		<h2>Use Select Days to set specific days for calls<h2>
	<div>
    <div class="content">
    <div class="card-grid">
      <div class="card">
		<div style="display:flex;">
		<div class="grid-container">
        <form action="/times" method="POST">
            <i class="fas fa-play" onclick="playRev()"></i>
			<label for="revellie">Reveille</label>
            <input type="time" id ="revellie" name="revellie" class="grid-item"> <input type="checkbox"  id="revellieToggle"><input type="hidden" name="revellieToggle" id="revTogHidden"><br>
			<i class="fas fa-play" onclick="playAnthem()"></i>
			<label for="anthem">National Anthem</label>
            <input type="time" id ="anthem" name="antem" class="grid-item"><input type="checkbox" id="anthemToggle"><input type="hidden" name="anthemToggle" id="antTogHidden"><br>
			<i class="fas fa-play" onclick="playRet()"></i>
		    <label for="retreat">Retreat/To the colors</label>
            <input type="time" id ="retreat" name="retreat" class="grid-item"><input type="checkbox" id="retreatToggle"><input type="hidden" name="retreatToggle"  id="retTogHidden"><br>
			<i class="fas fa-play" onclick="playTat()"></i>
			<label for="tattoo">Tattoo</label>
            <input type="time" id ="tattoo" name="tattoo" class="grid-item"><input type="checkbox" id="tattooToggle"><input type="hidden" name="tattooToggle" id="tatTogHidden"><br>
            <i class="fas fa-play" onclick="playTaps()"></i>
			<label for="taps">TAPS</label>
            <input type="time" id ="taps" name="taps" class="grid-item"><input type="checkbox" id="tapsToggle"><input type="hidden"  name="tapsToggle" id="tapTogHidden"><br>
		</div>
		<div class="grid-container" style="text-align: -webkit-left;">
			<label><input type="checkbox" id="monday" value="1">Monday</label>
			<label><input type="checkbox" value="2" id="tuesday">Tuesday</label>
			<label><input type="checkbox" value="3" id="wednesday">Wednesday</label>
			<label><input type="checkbox" value="4" id="thursday">Thursday</label>
			<label><input type="checkbox" value="5" id="friday">Friday</label>
			<label><input type="checkbox" value="6" id="saturday">Saturday</label>
			<label><input type="checkbox" value="0" id="sunday">Sunday</label>
		</div>
		</div>
			<input type="hidden" name="bugledays" id="bugledays">
            <input type="submit" onclick="setupSubmit()" value="Submit">
        </form>
	  </div>
    </div>
  </div>
  <script>	
	window.onload = function() {
		getRevellie();
		getRetreat();
		getTaps();
		getTattoo();
		getAnthem();
		getDays();
		getRevTog();
		getAntTog();
		getRetTog();
		getTatTog();
		getTapTog();
	}
	function getRevellie(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				document.getElementById("revellie").value = this.responseText;
			}
		}
		xhttp.open("GET", "getRevellie", true);
		xhttp.send();
	}
	function getRevTog(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				if(this.responseText == "on") {
					document.getElementById("revellieToggle").checked = true;
				}
				else{
					document.getElementById("revellieToggle").checked = false;
				}
			}
		}
		xhttp.open("GET", "getRevTog", true);
		xhttp.send();
	}
	function getAntTog(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				if(this.responseText == "on") {
					document.getElementById("anthemToggle").checked = true;
				}
				else{
					document.getElementById("anthemToggle").checked = false;
				}
			}
		}
		xhttp.open("GET", "getAntTog", true);
		xhttp.send();
	}
	function getRetTog(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				if(this.responseText == "on") {
					document.getElementById("retreatToggle").checked = true;
				}
				else{
					document.getElementById("retreatToggle").checked = false;
				}
			}
		}
		xhttp.open("GET", "getRetTog", true);
		xhttp.send();
	}
	function getTatTog(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				if(this.responseText == "on") {
					document.getElementById("tattooToggle").checked = true;
				}
				else{
					document.getElementById("tattooToggle").checked = false;
				}
			}
		}
		xhttp.open("GET", "getTatTog", true);
		xhttp.send();
	}
	function getTapTog(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				if(this.responseText == "on") {
					document.getElementById("tapsToggle").checked = true;
				}
				else{
					document.getElementById("tapsToggle").checked = false;
				}
			}
		}
		xhttp.open("GET", "getTapTog", true);
		xhttp.send();
	}
	
	function setupSubmit(){
		toggleRev();
		setupDays();
	}
	function getRetreat(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				document.getElementById("retreat").value = this.responseText;
			}
		}
		xhttp.open("GET", "getRetreat", true);
		xhttp.send();
	}
	function getTaps(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				document.getElementById("taps").value = this.responseText;
			}
		}
		xhttp.open("GET", "getTaps", true);
		xhttp.send();
	}
	function getTattoo(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				document.getElementById("tattoo").value = this.responseText;
			}
		}
		xhttp.open("GET", "getTattoo", true);
		xhttp.send();
	}
	function getRevellie(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				document.getElementById("revellie").value = this.responseText;
			}
		}
		xhttp.open("GET", "getRevellie", true);
		xhttp.send();
	}
	function getAnthem(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				document.getElementById("anthem").value = this.responseText;
			}
		}
		xhttp.open("GET", "getAnthem", true);
		xhttp.send();
	}
	function playRet(){
		var xhttp = new XMLHttpRequest();
		xhttp.open("GET", "playRet", true);
		xhttp.send();
	}
	
	function playRev(){
		var xhttp = new XMLHttpRequest();
		xhttp.open("GET", "playRev", true);
		xhttp.send();
	}
	
	function playTaps(){
		var xhttp = new XMLHttpRequest();
		xhttp.open("GET", "playTaps", true);
		xhttp.send();
	}
	
	function playTat(){
		var xhttp = new XMLHttpRequest();
		xhttp.open("GET", "playTat", true);
		xhttp.send();
	}
	
	function playAnthem(){
		var xhttp = new XMLHttpRequest();
		xhttp.open("GET", "playAnt", true);
		xhttp.send();
	}
	
	function getDays(){
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {
			if(this.readyState == 4 && this.status == 200){
				document.getElementById("bugledays").value = this.responseText;
				if(this.responseText.includes("1")){
					document.getElementById("monday").checked = true;
				}
				if(this.responseText.includes("2")){
					document.getElementById("tuesday").checked = true;
				}
				if(this.responseText.includes("3")){
					document.getElementById("wednesday").checked = true;
				}
				if(this.responseText.includes("4")){
					document.getElementById("thursday").checked = true;
				}
				if(this.responseText.includes("5")){
					document.getElementById("friday").checked = true;
				}
				if(this.responseText.includes("6")){
					document.getElementById("saturday").checked = true;
				}
				if(this.responseText.includes("0")){
					document.getElementById("sunday").checked = true;
				}
			}
			
		}
		
		xhttp.open("GET", "getDays", true);
		xhttp.send();
	}

	function toggleDropdown() {
		document.getElementById("dropdownList").classList.toggle("show");
	}

	// Close dropdown if clicked outside
	window.onclick = function(event) {
		if (!event.target.matches('.dropdown-btn')) {
			document.querySelectorAll(".dropdown-content").forEach(function(dropdown) {
				dropdown.classList.remove("show");
			});
		}
	}
	
	function toggleRev(){
		if(document.getElementById("revellieToggle").checked){
			document.getElementById("revTogHidden").value = "on"
		}
		else{
			document.getElementById("revTogHidden").value = "off"
		}
		if(document.getElementById("anthemToggle").checked){
			document.getElementById("antTogHidden").value = "on"
		}
		else{
			document.getElementById("antTogHidden").value = "off"
		}
		if(document.getElementById("retreatToggle").checked){
			document.getElementById("retTogHidden").value = "on"
		}
		else{
			document.getElementById("retTogHidden").value = "off"
		}
		if(document.getElementById("tattooToggle").checked){
			document.getElementById("tatTogHidden").value = "on"
		}
		else{
			document.getElementById("tatTogHidden").value = "off"
		}
		if(document.getElementById("tapsToggle").checked){
			document.getElementById("tapTogHidden").value = "on"
		}
		else{
			document.getElementById("tapTogHidden").value = "off"
		}
	}
	
	
	function setupDays() {
		var days = "";
		if(document.getElementById("monday").checked){
			days += "1";
		}
		if(document.getElementById("tuesday").checked){
			days += "2";
		}
		if(document.getElementById("wednesday").checked){
			days += "3";
		}
		if(document.getElementById("thursday").checked){
			days += "4";
		}if(document.getElementById("friday").checked){
			days += "5";
		}if(document.getElementById("saturday").checked){
			days += "6";
		}if(document.getElementById("sunday").checked){
			days += "0";
		}
		document.getElementById("bugledays").value = days;
	}
	
  </script>
  </body>
</html>
