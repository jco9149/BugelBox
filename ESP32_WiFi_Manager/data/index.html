<!DOCTYPE html>
<html>
  <head>
    <title>ESP WEB SERVER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">

  <body>
    <div class="topnav">
      <h1>ESP WEB SERVER</h1>
    </div>
	<div>
		<h2>Use the clock buttons to set times for bugels<h2>
	<div>
    <div class="content">
    <div class="card-grid">
      <div class="card">
        <form action="/times" method="POST">
          <p>
            <label for="revellie">Revellie</label>
            <input type="time" id ="revellie" name="revellie"><br>
            <label for="retreat">Retreat</label>
            <input type="time" id ="retreat" name="retreat"><br>
            <label for="taps">TAPS</label>
            <input type="time" id ="taps" name="taps" ><br>
            <label for="tattoo">Tattoo</label>
            <input type="time" id ="tattoo" name="tattoo"><br><br>
            <input type ="submit" value ="Submit">
          </p>
        </form>
      </div>
    </div>
  </div>
  </body>
